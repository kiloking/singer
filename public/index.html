<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Singer - 自動歌詞工具</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --highlight: #ffd700;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .search-bar input {
      flex: 1;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
    }
    .search-bar input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .search-bar button {
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 500;
      cursor: pointer;
    }
    .search-bar button:hover { opacity: 0.9; }
    .results {
      margin-bottom: 1.5rem;
      max-height: 360px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .result-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .result-item:hover { background: var(--surface); }
    .result-item img {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
    }
    .result-item .meta { flex: 1; }
    .result-item .title { font-weight: 500; }
    .result-item .artist { font-size: 0.875rem; color: var(--muted); }
    .player-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1rem;
    }
    @media (max-width: 640px) { .player-section { grid-template-columns: 1fr; } }
    .player-box {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .player-box h2 {
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }
    .yt-embed {
      aspect-ratio: 16/9;
      background: #000;
    }
    .yt-embed iframe { width: 100%; height: 100%; border: none; }
    .lyrics-box {
      min-height: 320px;
      padding: 1rem;
      overflow-y: auto;
      font-size: 1.125rem;
      line-height: 2;
    }
    .lyrics-line {
      transition: color 0.2s, transform 0.2s;
    }
    .lyrics-line.active {
      color: var(--highlight);
      transform: scale(1.02);
      font-weight: 600;
    }
    .lyrics-line.past { color: var(--muted); opacity: 0.7; }
    .options-row {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .obs-url, .color-picker {
      padding: 0.75rem;
      background: var(--surface);
      border-radius: 8px;
      border: 1px dashed var(--border);
    }
    .color-picker label, .obs-url label {
      font-size: 0.75rem;
      color: var(--muted);
      display: block;
      margin-bottom: 0.25rem;
    }
    .color-options {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .color-btn {
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
    }
    .color-btn:hover { border-color: var(--accent); }
    .color-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
    .color-picker input[type="color"] {
      width: 32px;
      height: 28px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
    }
    .obs-url code {
      display: block;
      font-size: 0.8rem;
      word-break: break-all;
      color: var(--accent);
    }
    .empty { color: var(--muted); text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <div class="layout">
    <h1>🎤 Singer - 自動歌詞工具</h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜尋歌曲或歌手..." autofocus>
      <button id="searchBtn">搜尋</button>
    </div>
    <div class="results" id="results"></div>
    <div class="player-section">
      <div class="player-box">
        <h2>YouTube 播放</h2>
        <div class="yt-embed" id="ytEmbed">
          <div class="empty">選擇歌曲後顯示</div>
        </div>
      </div>
      <div class="player-box">
        <h2>歌詞 (KTV 模式)</h2>
        <div class="lyrics-box" id="lyricsBox">
          <div class="empty">選擇歌曲後載入歌詞</div>
        </div>
      </div>
    </div>
    <div class="options-row">
      <div class="obs-url">
        <label>OBS 掛載 URL（在 OBS 新增 Browser Source 貼上此網址）</label>
        <code id="obsUrl">http://localhost:3847/obs</code>
      </div>
      <div class="color-picker">
        <label>歌詞顏色</label>
        <div class="color-options">
          <button type="button" class="color-btn" data-color="#ffd700" title="金">金</button>
          <button type="button" class="color-btn" data-color="#ffffff" title="白">白</button>
          <button type="button" class="color-btn" data-color="#ff6b6b" title="紅">紅</button>
          <button type="button" class="color-btn" data-color="#4ecdc4" title="青">青</button>
          <button type="button" class="color-btn" data-color="#95e1a3" title="綠">綠</button>
          <input type="color" id="colorInput" value="#ffd700" title="自訂">
        </div>
      </div>
    </div>
  </div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
